<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 - 工作面板</title>
<style>
:root { --primary: #4F46E5; --primary-dark: #3730A3; --bg: #F1F5F9; --bg-card: #FFFFFF; --text: #1E293B; --text-secondary: #64748B; --text-muted: #94A3B8; --border: #E2E8F0; --danger: #EF4444; --success: #10B981; --radius: 10px; --radius-sm: 6px; --transition: 0.2s ease; --shadow-lg: 0 10px 15px rgba(0,0,0,0.1); }
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
.login-container { width: 400px; max-width: 92vw; }
.login-header { text-align: center; margin-bottom: 20px; }
.login-header .logo { font-size: 36px; margin-bottom: 6px; }
.login-header h1 { font-size: 22px; font-weight: 700; }
.card { background: var(--bg-card); border-radius: 14px; box-shadow: var(--shadow-lg); padding: 28px 26px; }
.tabs { display: flex; margin-bottom: 22px; background: var(--bg); border-radius: var(--radius); padding: 3px; }
.tab-btn { flex: 1; padding: 9px; border: none; background: transparent; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600; color: var(--text-secondary); transition: var(--transition); }
.tab-btn.active { background: var(--bg-card); color: var(--primary); box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: 12px; font-weight: 600; color: var(--text-secondary); margin-bottom: 5px; }
.form-group input { width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 14px; font-family: inherit; }
.form-group input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79,70,229,0.1); }
.form-hint { font-size: 11px; color: var(--text-muted); margin-top: 3px; }
.btn { display: flex; align-items: center; justify-content: center; width: 100%; padding: 11px; border: none; border-radius: var(--radius-sm); font-size: 15px; font-weight: 600; cursor: pointer; transition: var(--transition); }
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: var(--primary-dark); }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
.msg { font-size: 13px; text-align: center; min-height: 20px; margin-top: 10px; line-height: 1.5; }
.msg.error { color: var(--danger); }
.msg.success { color: var(--success); }
.invite-box { background: #F0FDF4; border: 1px solid #BBF7D0; border-radius: var(--radius); padding: 14px 16px; margin-top: 12px; text-align: center; display: none; }
.invite-box .icode { font-size: 22px; font-weight: 700; color: #166534; letter-spacing: 2px; font-family: monospace; }
.invite-box .ihint { font-size: 11px; color: #166534; margin-top: 4px; }
#inviteGroup { display: none; }
</style>
</head>
<body>
<div class="login-container">
  <div class="login-header">
    <div class="logo">📋</div>
    <h1>工作面板</h1>
  </div>

  <div class="card">
    <div class="tabs">
      <button class="tab-btn active" id="tabLogin">登 录</button>
      <button class="tab-btn" id="tabRegister">注 册</button>
    </div>

    <form id="authForm">
      <div class="form-group">
        <label id="accountLabel">用户名 / 邮箱</label>
        <input type="text" id="account" placeholder="输入用户名或邮箱" autocomplete="username">
        <div class="form-hint" id="accountHint"></div>
      </div>

      <!-- 邀请码（仅用户名注册时显示） -->
      <div class="form-group" id="inviteGroup">
        <label>邀请码</label>
        <input type="text" id="inviteCode" placeholder="输入邀请码（用户名注册必填）" maxlength="20" style="text-transform:uppercase;letter-spacing:2px;">
      </div>

      <div class="form-group">
        <label>密码</label>
        <input type="password" id="password" placeholder="请输入密码（至少6位）" minlength="6" maxlength="64" autocomplete="current-password">
      </div>

      <button type="submit" class="btn btn-primary" id="submitBtn">登 录</button>

      <div class="invite-box" id="inviteBox">
        <div style="font-size:13px;color:#166534;margin-bottom:4px;">🎉 注册成功！你的邀请码（可分享 3 人）：</div>
        <div class="icode" id="myInviteCode"></div>
        <div class="ihint">3 秒后自动跳转...</div>
      </div>

      <div class="msg" id="msg"></div>
    </form>
  </div>
</div>

<script src="supabase-config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.110.8/dist/umd/supabase.min.js"></script>
<script>
(function() {
  var msgEl = document.getElementById('msg');
  var btnEl = document.getElementById('submitBtn');
  var inviteBox = document.getElementById('inviteBox');
  var inviteGroup = document.getElementById('inviteGroup');
  var accountLabel = document.getElementById('accountLabel');
  var accountHint = document.getElementById('accountHint');
  var accountInput = document.getElementById('account');
  var supabase;
  var mode = 'login';

  if (typeof SUPABASE_URL === 'undefined' || SUPABASE_URL.indexOf('YOUR_PROJECT_ID') >= 0) {
    msgEl.className = 'msg error'; msgEl.textContent = '请先配置 supabase-config.js'; btnEl.disabled = true; return;
  }
  try {
    if (!window.supabase) throw new Error('SDK 未加载');
    supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  } catch(e) {
    msgEl.className = 'msg error'; msgEl.textContent = '初始化失败: ' + e.message; btnEl.disabled = true; return;
  }

  function isEmail(v) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v); }

  // Detect input type on typing
  accountInput.addEventListener('input', function() {
    if (mode !== 'register') return;
    var v = this.value.trim();
    if (isEmail(v)) {
      // Email registration
      accountLabel.textContent = '邮箱';
      accountHint.textContent = '将发送验证码至此邮箱';
      accountHint.style.color = 'var(--success)';
      inviteGroup.style.display = 'none';
    } else if (v.length > 0) {
      // Username registration
      accountLabel.textContent = '用户名';
      accountHint.textContent = '用户名注册需要邀请码';
      accountHint.style.color = 'var(--text-muted)';
      inviteGroup.style.display = 'block';
    } else {
      accountLabel.textContent = '用户名 / 邮箱';
      accountHint.textContent = '';
      inviteGroup.style.display = 'none';
    }
  });

  // Tabs
  document.getElementById('tabLogin').addEventListener('click', function() {
    mode = 'login';
    document.getElementById('tabLogin').classList.add('active');
    document.getElementById('tabRegister').classList.remove('active');
    accountLabel.textContent = '用户名 / 邮箱';
    accountHint.textContent = '';
    inviteGroup.style.display = 'none';
    btnEl.textContent = '登 录';
    btnEl.style.display = 'flex';
    msgEl.textContent = ''; msgEl.className = 'msg';
    inviteBox.style.display = 'none';
  });

  document.getElementById('tabRegister').addEventListener('click', function() {
    mode = 'register';
    document.getElementById('tabRegister').classList.add('active');
    document.getElementById('tabLogin').classList.remove('active');
    accountLabel.textContent = '用户名 / 邮箱';
    accountHint.textContent = '';
    inviteGroup.style.display = 'none';
    btnEl.textContent = '注 册';
    btnEl.style.display = 'flex';
    msgEl.textContent = ''; msgEl.className = 'msg';
    inviteBox.style.display = 'none';
    accountInput.value = '';
  });

  // Submit
  document.getElementById('authForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    msgEl.className = 'msg'; msgEl.textContent = '';
    inviteBox.style.display = 'none';

    var account = accountInput.value.trim();
    var password = document.getElementById('password').value;
    var inviteCode = document.getElementById('inviteCode').value.trim();

    if (!account) { msgEl.className = 'msg error'; msgEl.textContent = '请输入用户名或邮箱'; return; }
    if (!password || password.length < 6) { msgEl.className = 'msg error'; msgEl.textContent = '密码至少 6 位'; return; }

    btnEl.disabled = true;
    btnEl.textContent = '处理中...';

    try {
      // ========== LOGIN ==========
      if (mode === 'login') {
        var email = account;
        if (!isEmail(account)) {
          var r = await supabase.rpc('get_email_by_username', { p_username: account });
          if (r.error || !r.data) throw new Error('用户不存在');
          email = r.data;
        }
        var result = await supabase.auth.signInWithPassword({ email: email, password: password });
        if (result.error) {
          if (result.error.message.indexOf('Invalid login') >= 0) throw new Error('密码错误');
          throw result.error;
        }
        window.location.href = 'app.html';
        return;
      }

      // ========== REGISTER ==========
      var isEmailReg = isEmail(account);

      if (isEmailReg) {
        // -- 邮箱注册：发验证码，无需邀请码 --
        var emailAddr = account;
        var uname = emailAddr.split('@')[0].replace(/[^a-zA-Z0-9一-鿿_-]/g, '').substring(0, 15);
        uname = uname + '_' + Math.random().toString(36).slice(2, 5);

        var result = await supabase.auth.signUp({
          email: emailAddr,
          password: password,
          options: { data: { username: uname } }
        });
        if (result.error) throw result.error;
        if (!result.data.user) throw new Error('注册失败');

        if (result.data.session) {
          // Auto-login
          await supabase.from('profiles').insert({ id: result.data.user.id, username: uname });
          var cr = await supabase.rpc('generate_invitation_code', { p_user_id: result.data.user.id });
          if (cr.data) { document.getElementById('myInviteCode').textContent = cr.data; inviteBox.style.display = 'block'; btnEl.style.display = 'none'; setTimeout(function() { window.location.href = 'app.html'; }, 3500); }
          else { window.location.href = 'app.html'; }
        } else {
          msgEl.className = 'msg success';
          msgEl.textContent = '✅ 验证码已发送至 ' + emailAddr + '，请查收邮件';
          btnEl.disabled = false;
          btnEl.textContent = '注 册';
        }

      } else {
        // -- 用户名注册：必须有邀请码 --
        if (!inviteCode) { msgEl.className = 'msg error'; msgEl.textContent = '用户名注册需要邀请码'; btnEl.disabled = false; btnEl.textContent = '注 册'; return; }

        // Validate invitation code
        var codeCheck = await supabase.from('invitation_codes').select('*').eq('code', inviteCode.toUpperCase()).maybeSingle();
        if (codeCheck.error || !codeCheck.data) { msgEl.className = 'msg error'; msgEl.textContent = '邀请码无效'; btnEl.disabled = false; btnEl.textContent = '注 册'; return; }
        if (codeCheck.data.used_count >= codeCheck.data.max_uses) { msgEl.className = 'msg error'; msgEl.textContent = '邀请码已达使用上限（3人）'; btnEl.disabled = false; btnEl.textContent = '注 册'; return; }

        var uname = account;
        var fakeEmail = uname + '@wp.user';

        var result = await supabase.auth.signUp({
          email: fakeEmail,
          password: password,
          options: { data: { username: uname } }
        });
        if (result.error) throw result.error;
        if (!result.data.user) throw new Error('注册失败');

        var userId = result.data.user.id;

        // Create profile
        var pResult = await supabase.from('profiles').insert({ id: userId, username: uname });
        if (pResult.error) {
          if (pResult.message.indexOf('duplicate') >= 0) throw new Error('用户名已被占用');
        }

        // Mark invitation code as used
        await supabase.rpc('validate_and_use_code', { p_code: inviteCode.toUpperCase(), p_new_owner: userId });

        if (result.data.session) {
          // Generate code for new user
          var cr = await supabase.rpc('generate_invitation_code', { p_user_id: userId });
          if (cr.data) { document.getElementById('myInviteCode').textContent = cr.data; inviteBox.style.display = 'block'; btnEl.style.display = 'none'; setTimeout(function() { window.location.href = 'app.html'; }, 3500); }
          else { window.location.href = 'app.html'; }
        } else {
          msgEl.className = 'msg success';
          msgEl.textContent = '✅ 注册成功！切换到登录页登录';
          btnEl.disabled = false;
          btnEl.textContent = '注 册';
          setTimeout(function() {
            document.getElementById('tabLogin').click();
            accountInput.value = uname;
          }, 1500);
        }
      }
    } catch (err) {
      msgEl.className = 'msg error';
      msgEl.textContent = err.message || '操作失败';
      btnEl.disabled = false;
      btnEl.textContent = mode === 'login' ? '登 录' : '注 册';
    }
  });
})();
</script>
</body>
</html>
