<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>зҷ»еҪ• - е·ҘдҪңйқўжқҝ</title>
<style>
:root { --primary: #4F46E5; --primary-dark: #3730A3; --bg: #F1F5F9; --bg-card: #FFFFFF; --text: #1E293B; --text-secondary: #64748B; --text-muted: #94A3B8; --border: #E2E8F0; --danger: #EF4444; --success: #10B981; --radius: 10px; --radius-sm: 6px; --transition: 0.2s ease; --shadow-lg: 0 10px 15px rgba(0,0,0,0.1); }
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
.login-container { width: 400px; max-width: 92vw; }
.login-header { text-align: center; margin-bottom: 20px; }
.login-header .logo { font-size: 36px; margin-bottom: 6px; }
.login-header h1 { font-size: 22px; font-weight: 700; }
.card { background: var(--bg-card); border-radius: 14px; box-shadow: var(--shadow-lg); padding: 28px 26px; }
.tabs { display: flex; margin-bottom: 18px; background: var(--bg); border-radius: var(--radius); padding: 3px; }
.tab-btn { flex: 1; padding: 9px; border: none; background: transparent; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600; color: var(--text-secondary); transition: var(--transition); }
.tab-btn.active { background: var(--bg-card); color: var(--primary); box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
.fg { margin-bottom: 14px; }
.fg label { display: block; font-size: 12px; font-weight: 600; color: var(--text-secondary); margin-bottom: 5px; }
.fg input { width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 14px; font-family: inherit; }
.fg input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79,70,229,0.1); }
.fh { font-size: 11px; color: var(--text-muted); margin-top: 3px; }
.btn { display: flex; align-items: center; justify-content: center; width: 100%; padding: 11px; border: none; border-radius: var(--radius-sm); font-size: 15px; font-weight: 600; cursor: pointer; transition: var(--transition); }
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: var(--primary-dark); }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
.msg { font-size: 13px; text-align: center; min-height: 20px; margin-top: 10px; line-height: 1.5; }
.msg.error { color: var(--danger); }
.msg.success { color: var(--success); }
.invite-box { background: #F0FDF4; border: 1px solid #BBF7D0; border-radius: var(--radius); padding: 14px 16px; margin-top: 12px; text-align: center; display: none; }
.invite-box .icode { font-size: 22px; font-weight: 700; color: #166534; letter-spacing: 2px; font-family: monospace; }
.invite-box .ihint { font-size: 11px; color: #166534; margin-top: 4px; }
#inviteGroup, #codeGroup, #regPwdGroup, #loginPwd { display: none; }
</style>
</head>
<body>
<div class="login-container">
  <div class="login-header">
    <div class="logo">рҹ“Ӣ</div>
    <h1>е·ҘдҪңйқўжқҝ</h1>
  </div>

  <div class="card">
    <div class="tabs">
      <button class="tab-btn active" id="tabLogin">зҷ» еҪ•</button>
      <button class="tab-btn" id="tabRegister">жіЁ еҶҢ</button>
    </div>

    <form id="authForm">
      <!-- иҙҰеҸ· -->
      <div class="fg">
        <label id="accountLabel">з”ЁжҲ·еҗҚ / йӮ®з®ұ</label>
        <input type="text" id="account" placeholder="иҫ“е…Ҙз”ЁжҲ·еҗҚжҲ–йӮ®з®ұ" autocomplete="username">
        <div class="fh" id="accountHint"></div>
      </div>

      <!-- зҷ»еҪ•еҜҶз Ғ -->
      <div class="fg" id="loginPwd">
        <label>еҜҶз Ғ</label>
        <input type="password" id="password" placeholder="иҜ·иҫ“е…ҘеҜҶз Ғ" minlength="6" maxlength="64">
      </div>

      <!-- жіЁеҶҢйӮ®з®ұз”ЁпјҡйӘҢиҜҒз Ғ -->
      <div class="fg" id="codeGroup">
        <label>йӮ®з®ұйӘҢиҜҒз Ғ</label>
        <input type="text" id="verifyCode" placeholder="иҫ“е…ҘйӮ®д»¶дёӯзҡ„ 6 дҪҚйӘҢиҜҒз Ғ" maxlength="6" inputmode="numeric" style="letter-spacing:8px;text-align:center;font-size:20px;">
        <div class="fh" style="color:var(--success);">йӘҢиҜҒз Ғе·ІеҸ‘йҖҒпјҢ5 еҲҶй’ҹеҶ…жңүж•Ҳ</div>
      </div>

      <!-- жіЁеҶҢеҜҶз Ғ -->
      <div class="fg" id="regPwdGroup">
        <label>и®ҫзҪ®еҜҶз Ғ</label>
        <input type="password" id="regPassword" placeholder="и®ҫзҪ®зҷ»еҪ•еҜҶз ҒпјҲиҮіе°‘6дҪҚпјү" minlength="6" maxlength="64">
      </div>

      <!-- з”ЁжҲ·еҗҚжіЁеҶҢпјҡйӮҖиҜ·з Ғ -->
      <div class="fg" id="inviteGroup">
        <label>йӮҖиҜ·з Ғ</label>
        <input type="text" id="inviteCode" placeholder="иҫ“е…ҘйӮҖиҜ·з ҒпјҲеҝ…еЎ«пјү" maxlength="20" style="text-transform:uppercase;letter-spacing:2px;">
      </div>

      <button type="submit" class="btn btn-primary" id="submitBtn">зҷ» еҪ•</button>

      <!-- йӮ®з®ұжіЁеҶҢпјҡеҸ‘йӘҢиҜҒз ҒжҢүй’® -->
      <button type="button" class="btn btn-primary" id="sendCodeBtn" style="display:none;">еҸ‘йҖҒйӘҢиҜҒз Ғ</button>

      <div class="invite-box" id="inviteBox">
        <div style="font-size:13px;color:#166534;margin-bottom:4px;">рҹҺү жіЁеҶҢжҲҗеҠҹпјҒдҪ зҡ„йӮҖиҜ·з ҒпјҲеҸҜеҲҶдә« 3 дәәпјүпјҡ</div>
        <div class="icode" id="myInviteCode"></div>
        <div class="ihint">3 з§’еҗҺиҮӘеҠЁи·іиҪ¬...</div>
      </div>

      <div class="msg" id="msg"></div>
    </form>
  </div>
</div>

<script src="supabase-config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.110.8/dist/umd/supabase.min.js"></script>
<script>
(function() {
  var msgEl = document.getElementById('msg');
  var btnEl = document.getElementById('submitBtn');
  var sendCodeBtn = document.getElementById('sendCodeBtn');
  var inviteBox = document.getElementById('inviteBox');
  var inviteGroup = document.getElementById('inviteGroup');
  var codeGroup = document.getElementById('codeGroup');
  var regPwdGroup = document.getElementById('regPwdGroup');
  var loginPwd = document.getElementById('loginPwd');
  var accountLabel = document.getElementById('accountLabel');
  var accountHint = document.getElementById('accountHint');
  var accountInput = document.getElementById('account');
  var supabase;
  var mode = 'login';
  var emailRegStep = 0; // 0=enter email, 1=enter code, 2=set pwd
  var regEmail = '';

  if (typeof SUPABASE_URL === 'undefined' || SUPABASE_URL.indexOf('YOUR_PROJECT_ID') >= 0) {
    msgEl.className = 'msg error'; msgEl.textContent = 'иҜ·е…Ҳй…ҚзҪ® supabase-config.js'; return;
  }
  try {
    if (!window.supabase) throw new Error('SDK жңӘеҠ иҪҪ');
    supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  } catch(e) { msgEl.className = 'msg error'; msgEl.textContent = 'еҲқе§ӢеҢ–еӨұиҙҘ: ' + e.message; return; }

  function isEmail(v) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v); }

  function showLoginUI() {
    loginPwd.style.display = 'block';
    codeGroup.style.display = 'none';
    regPwdGroup.style.display = 'none';
    inviteGroup.style.display = 'none';
    sendCodeBtn.style.display = 'none';
    btnEl.style.display = 'flex';
    btnEl.textContent = 'зҷ» еҪ•';
  }

  // Detect input type for registration
  accountInput.addEventListener('input', function() {
    if (mode !== 'register') return;
    var v = this.value.trim();
    emailRegStep = 0;
    if (isEmail(v)) {
      accountLabel.textContent = 'йӮ®з®ұ';
      accountHint.textContent = 'е°ҶеҸ‘йҖҒйӘҢиҜҒз ҒиҮіжӯӨйӮ®з®ұ';
      accountHint.style.color = 'var(--success)';
      inviteGroup.style.display = 'none';
      codeGroup.style.display = 'none';
      regPwdGroup.style.display = 'none';
      sendCodeBtn.style.display = 'block';
      sendCodeBtn.textContent = 'еҸ‘йҖҒйӘҢиҜҒз Ғ';
      btnEl.style.display = 'none';
    } else if (v.length > 0) {
      accountLabel.textContent = 'з”ЁжҲ·еҗҚ';
      accountHint.textContent = 'з”ЁжҲ·еҗҚжіЁеҶҢйңҖиҰҒйӮҖиҜ·з Ғ';
      accountHint.style.color = 'var(--text-muted)';
      inviteGroup.style.display = 'block';
      codeGroup.style.display = 'none';
      regPwdGroup.style.display = 'block';
      sendCodeBtn.style.display = 'none';
      btnEl.style.display = 'flex';
      btnEl.textContent = 'жіЁ еҶҢ';
    } else {
      accountLabel.textContent = 'з”ЁжҲ·еҗҚ / йӮ®з®ұ';
      accountHint.textContent = '';
      inviteGroup.style.display = 'none';
      codeGroup.style.display = 'none';
      regPwdGroup.style.display = 'none';
      sendCodeBtn.style.display = 'none';
      btnEl.style.display = 'flex';
      btnEl.textContent = 'жіЁ еҶҢ';
    }
  });

  // Tabs
  document.getElementById('tabLogin').addEventListener('click', function() {
    mode = 'login'; emailRegStep = 0;
    document.getElementById('tabLogin').classList.add('active');
    document.getElementById('tabRegister').classList.remove('active');
    accountLabel.textContent = 'з”ЁжҲ·еҗҚ / йӮ®з®ұ';
    accountHint.textContent = '';
    showLoginUI();
    msgEl.textContent = ''; msgEl.className = 'msg';
    inviteBox.style.display = 'none';
    accountInput.value = '';
  });

  document.getElementById('tabRegister').addEventListener('click', function() {
    mode = 'register'; emailRegStep = 0;
    document.getElementById('tabRegister').classList.add('active');
    document.getElementById('tabLogin').classList.remove('active');
    accountLabel.textContent = 'з”ЁжҲ·еҗҚ / йӮ®з®ұ';
    accountHint.textContent = '';
    loginPwd.style.display = 'none';
    codeGroup.style.display = 'none';
    regPwdGroup.style.display = 'none';
    inviteGroup.style.display = 'none';
    sendCodeBtn.style.display = 'none';
    btnEl.style.display = 'flex';
    btnEl.textContent = 'жіЁ еҶҢ';
    msgEl.textContent = ''; msgEl.className = 'msg';
    inviteBox.style.display = 'none';
    accountInput.value = '';
  });

  // Send verification code (email registration - step 1)
  sendCodeBtn.addEventListener('click', async function() {
    var email = accountInput.value.trim();
    if (!isEmail(email)) return;

    sendCodeBtn.disabled = true;
    sendCodeBtn.textContent = 'еҸ‘йҖҒдёӯ...';
    msgEl.className = 'msg'; msgEl.textContent = '';

    try {
      var result = await supabase.auth.signInWithOtp({
        email: email,
        options: { shouldCreateUser: true }
      });
      if (result.error) throw result.error;

      regEmail = email;
      emailRegStep = 1;
      sendCodeBtn.style.display = 'none';
      codeGroup.style.display = 'block';
      regPwdGroup.style.display = 'block';
      btnEl.style.display = 'flex';
      btnEl.textContent = 'йӘҢиҜҒе№¶жіЁеҶҢ';
      msgEl.className = 'msg success';
      msgEl.textContent = 'вң… йӘҢиҜҒз Ғе·ІеҸ‘йҖҒиҮі ' + email;
      accountInput.readOnly = true;
    } catch (err) {
      msgEl.className = 'msg error';
      msgEl.textContent = err.message || 'еҸ‘йҖҒеӨұиҙҘ';
      sendCodeBtn.disabled = false;
      sendCodeBtn.textContent = 'йҮҚж–°еҸ‘йҖҒ';
    }
  });

  // Submit
  document.getElementById('authForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    msgEl.className = 'msg'; msgEl.textContent = '';
    inviteBox.style.display = 'none';

    var account = accountInput.value.trim();
    if (!account) { msgEl.className = 'msg error'; msgEl.textContent = 'иҜ·иҫ“е…Ҙз”ЁжҲ·еҗҚжҲ–йӮ®з®ұ'; return; }

    btnEl.disabled = true;

    try {
      // ========== LOGIN ==========
      if (mode === 'login') {
        var pwd = document.getElementById('password').value;
        if (!pwd) { msgEl.className = 'msg error'; msgEl.textContent = 'иҜ·иҫ“е…ҘеҜҶз Ғ'; btnEl.disabled = false; return; }

        btnEl.textContent = 'зҷ»еҪ•дёӯ...';
        var email = account;
        if (!isEmail(account)) {
          var r = await supabase.rpc('get_email_by_username', { p_username: account });
          if (r.error || !r.data) throw new Error('з”ЁжҲ·дёҚеӯҳеңЁ');
          email = r.data;
        }
        var result = await supabase.auth.signInWithPassword({ email: email, password: pwd });
        if (result.error) {
          if (result.error.message.indexOf('Invalid login') >= 0) throw new Error('еҜҶз Ғй”ҷиҜҜ');
          if (result.error.message.indexOf('Email not confirmed') >= 0) throw new Error('йӮ®з®ұжңӘйӘҢиҜҒпјҢиҜ·е…Ҳе®ҢжҲҗжіЁеҶҢ');
          throw result.error;
        }
        window.location.href = 'app.html';
        return;
      }

      // ========== REGISTER ==========
      var isEmailReg = isEmail(account);

      if (isEmailReg) {
        // -- йӮ®з®ұжіЁеҶҢпјҡйӘҢиҜҒз Ғ + еҜҶз Ғ --
        if (emailRegStep !== 1) {
          msgEl.className = 'msg error';
          msgEl.textContent = 'иҜ·е…ҲзӮ№еҮ»"еҸ‘йҖҒйӘҢиҜҒз Ғ"';
          btnEl.disabled = false;
          return;
        }

        var code = document.getElementById('verifyCode').value.trim();
        var pwd = document.getElementById('regPassword').value;
        if (!code || code.length < 6) { msgEl.className = 'msg error'; msgEl.textContent = 'иҜ·иҫ“е…Ҙ 6 дҪҚйӘҢиҜҒз Ғ'; btnEl.disabled = false; return; }
        if (!pwd || pwd.length < 6) { msgEl.className = 'msg error'; msgEl.textContent = 'иҜ·и®ҫзҪ®еҜҶз ҒпјҲиҮіе°‘6дҪҚпјү'; btnEl.disabled = false; return; }

        btnEl.textContent = 'йӘҢиҜҒдёӯ...';

        // Verify OTP
        var verifyResult = await supabase.auth.verifyOtp({ email: regEmail, token: code, type: 'email' });
        if (verifyResult.error) throw new Error('йӘҢиҜҒз Ғй”ҷиҜҜжҲ–е·ІиҝҮжңҹ');

        // Now logged in via OTP - set password
        var pwdResult = await supabase.auth.updateUser({ password: pwd });
        if (pwdResult.error) throw pwdResult.error;

        var userId = verifyResult.data.user.id;
        var uname = regEmail.split('@')[0].replace(/[^a-zA-Z0-9дёҖ-йҝҝ_-]/g, '').substring(0, 15) + '_' + Math.random().toString(36).slice(2, 5);

        await supabase.from('profiles').insert({ id: userId, username: uname });
        var cr = await supabase.rpc('generate_invitation_code', { p_user_id: userId });

        if (cr.data) { document.getElementById('myInviteCode').textContent = cr.data; inviteBox.style.display = 'block'; btnEl.style.display = 'none'; setTimeout(function() { window.location.href = 'app.html'; }, 3500); }
        else { window.location.href = 'app.html'; }

      } else {
        // -- з”ЁжҲ·еҗҚжіЁеҶҢпјҡйӮҖиҜ·з Ғ + еҜҶз Ғ --
        var inviteCode = document.getElementById('inviteCode').value.trim();
        var pwd = document.getElementById('regPassword').value;
        if (!inviteCode) { msgEl.className = 'msg error'; msgEl.textContent = 'йңҖиҰҒйӮҖиҜ·з Ғ'; btnEl.disabled = false; return; }
        if (!pwd || pwd.length < 6) { msgEl.className = 'msg error'; msgEl.textContent = 'иҜ·и®ҫзҪ®еҜҶз ҒпјҲиҮіе°‘6дҪҚпјү'; btnEl.disabled = false; return; }

        btnEl.textContent = 'йӘҢиҜҒйӮҖиҜ·з Ғ...';

        var codeCheck = await supabase.from('invitation_codes').select('*').eq('code', inviteCode.toUpperCase()).maybeSingle();
        if (codeCheck.error || !codeCheck.data) throw new Error('йӮҖиҜ·з Ғж— ж•Ҳ');
        if (codeCheck.data.used_count >= codeCheck.data.max_uses) throw new Error('йӮҖиҜ·з Ғе·ІиҫҫдҪҝз”ЁдёҠйҷҗпјҲ3дәәпјү');

        var uname = account;
        var fakeEmail = uname + '@wp.user';

        btnEl.textContent = 'жіЁеҶҢдёӯ...';
        var result = await supabase.auth.signUp({ email: fakeEmail, password: pwd, options: { data: { username: uname } } });
        if (result.error) throw result.error;
        if (!result.data.user) throw new Error('жіЁеҶҢеӨұиҙҘ');

        var userId = result.data.user.id;
        var pResult = await supabase.from('profiles').insert({ id: userId, username: uname });
        if (pResult.error && pResult.message.indexOf('duplicate') >= 0) throw new Error('з”ЁжҲ·еҗҚе·Іиў«еҚ з”Ё');

        await supabase.rpc('validate_and_use_code', { p_code: inviteCode.toUpperCase(), p_new_owner: userId });

        if (result.data.session) {
          var cr = await supabase.rpc('generate_invitation_code', { p_user_id: userId });
          if (cr.data) { document.getElementById('myInviteCode').textContent = cr.data; inviteBox.style.display = 'block'; btnEl.style.display = 'none'; setTimeout(function() { window.location.href = 'app.html'; }, 3500); }
          else { window.location.href = 'app.html'; }
        } else {
          msgEl.className = 'msg success';
          msgEl.textContent = 'вң… жіЁеҶҢжҲҗеҠҹпјҒиҜ·еҲҮжҚўеҲ°зҷ»еҪ•йЎөзҷ»еҪ•';
          btnEl.disabled = false; btnEl.textContent = 'жіЁ еҶҢ';
          setTimeout(function() { document.getElementById('tabLogin').click(); accountInput.value = uname; }, 1500);
        }
      }
    } catch (err) {
      msgEl.className = 'msg error';
      msgEl.textContent = err.message || 'ж“ҚдҪңеӨұиҙҘ';
      btnEl.disabled = false;
      if (mode === 'register') {
        btnEl.textContent = isEmail(accountInput.value.trim()) ? 'йӘҢиҜҒе№¶жіЁеҶҢ' : 'жіЁ еҶҢ';
        if (isEmail(accountInput.value.trim())) {
          sendCodeBtn.style.display = 'block';
          sendCodeBtn.disabled = false;
          sendCodeBtn.textContent = 'йҮҚж–°еҸ‘йҖҒ';
        }
      } else {
        btnEl.textContent = 'зҷ» еҪ•';
      }
    }
  });
})();
</script>
</body>
</html>
