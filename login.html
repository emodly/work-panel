<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>工作面板</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #F1F5F9; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
.box { width: 380px; background: #fff; border-radius: 14px; padding: 32px 28px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
h1 { text-align:center; font-size:20px; margin-bottom:6px; }
.sub { text-align:center; font-size:13px; color:#94A3B8; margin-bottom:24px; }
.tabs { display:flex; margin-bottom:20px; background:#F1F5F9; border-radius:8px; padding:3px; }
.tab { flex:1; padding:10px; border:none; background:transparent; border-radius:7px; cursor:pointer; font-size:14px; font-weight:600; color:#64748B; }
.tab.on { background:#fff; color:#4F46E5; box-shadow:0 1px 2px rgba(0,0,0,0.05); }
.fld { margin-bottom:14px; }
.fld input { width:100%; padding:10px 14px; border:1px solid #E2E8F0; border-radius:7px; font-size:14px; font-family:inherit; }
.fld input:focus { outline:none; border-color:#4F46E5; }
.btn { width:100%; padding:11px; border:none; border-radius:7px; font-size:15px; font-weight:600; cursor:pointer; background:#4F46E5; color:#fff; }
.btn:disabled { opacity:0.5; }
.msg { font-size:13px; text-align:center; margin-top:12px; min-height:20px; }
.msg.red { color:#EF4444; }
.msg.green { color:#10B981; }
</style>
</head>
<body>
<div class="box">
  <h1>📋 工作面板</h1>
  <p class="sub">登录或注册账号</p>
  <div class="tabs">
    <button class="tab on" id="tabLogin">登录</button>
    <button class="tab" id="tabReg">注册</button>
  </div>
  <form id="f">
    <div class="fld"><input type="email" id="email" placeholder="邮箱地址" required></div>
    <div class="fld"><input type="password" id="pwd" placeholder="密码（至少6位）" minlength="6" required></div>
    <button type="submit" class="btn" id="btn">登 录</button>
    <div class="msg" id="msg"></div>
  </form>
</div>

<script src="supabase-config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.110.8/dist/umd/supabase.min.js"></script>
<script>
(function(){
  if (typeof SUPABASE_URL === 'undefined' || SUPABASE_URL.indexOf('YOUR_PROJECT_ID') >= 0) {
    document.getElementById('msg').innerHTML = '<span class="red">请配置 supabase-config.js</span>';
    return;
  }
  var supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  var mode = 'login';
  var btn = document.getElementById('btn');
  var msg = document.getElementById('msg');

  document.getElementById('tabLogin').onclick = function(){
    mode = 'login';
    document.getElementById('tabLogin').classList.add('on');
    document.getElementById('tabReg').classList.remove('on');
    btn.textContent = '登 录';
    msg.textContent = '';
  };
  document.getElementById('tabReg').onclick = function(){
    mode = 'reg';
    document.getElementById('tabReg').classList.add('on');
    document.getElementById('tabLogin').classList.remove('on');
    btn.textContent = '注 册';
    msg.textContent = '';
  };

  document.getElementById('f').onsubmit = async function(e){
    e.preventDefault();
    msg.className = 'msg';
    var email = document.getElementById('email').value.trim();
    var pwd = document.getElementById('pwd').value;
    if (!email || !pwd || pwd.length < 6) {
      msg.className = 'msg red'; msg.textContent = '请输入正确的邮箱和密码（至少6位）'; return;
    }
    btn.disabled = true;
    btn.textContent = mode === 'login' ? '登录中...' : '注册中...';
    try {
      var r;
      if (mode === 'login') {
        r = await supabase.auth.signInWithPassword({ email: email, password: pwd });
      } else {
        r = await supabase.auth.signUp({ email: email, password: pwd });
      }
      if (r.error) {
        if (r.error.message.indexOf('Invalid login') >= 0) throw new Error('邮箱或密码错误');
        if (r.error.message.indexOf('already registered') >= 0) throw new Error('该邮箱已注册，请直接登录');
        if (r.error.message.indexOf('User already registered') >= 0) throw new Error('该邮箱已注册，请直接登录');
        throw r.error;
      }
      if (r.data.session || r.data.user) {
        window.location.href = 'app.html';
      } else {
        msg.className = 'msg green';
        msg.textContent = '注册成功！请登录';
        document.getElementById('tabLogin').click();
      }
    } catch(err) {
      msg.className = 'msg red';
      msg.textContent = err.message || '操作失败';
      btn.disabled = false;
      btn.textContent = mode === 'login' ? '登 录' : '注 册';
    }
  };
})();
</script>
</body>
</html>
