<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 - 工作面板</title>
<style>
:root {
  --primary: #4F46E5; --primary-dark: #3730A3; --bg: #F1F5F9; --bg-card: #FFFFFF;
  --text: #1E293B; --text-secondary: #64748B; --text-muted: #94A3B8; --border: #E2E8F0;
  --danger: #EF4444; --success: #10B981; --radius: 10px; --radius-sm: 6px; --transition: 0.2s ease;
  --shadow-lg: 0 10px 15px rgba(0,0,0,0.1), 0 4px 6px rgba(0,0,0,0.05);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: var(--bg); color: var(--text); min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
}
.login-container { width: 400px; max-width: 92vw; }
.login-header { text-align: center; margin-bottom: 24px; }
.login-header .logo { font-size: 36px; margin-bottom: 8px; }
.login-header h1 { font-size: 24px; font-weight: 700; }
.login-header p { font-size: 14px; color: var(--text-muted); margin-top: 4px; }
.card { background: var(--bg-card); border-radius: 14px; box-shadow: var(--shadow-lg); padding: 32px 28px; }
.tabs { display: flex; margin-bottom: 24px; background: var(--bg); border-radius: var(--radius); padding: 3px; }
.tab-btn { flex: 1; padding: 10px; border: none; background: transparent; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600; color: var(--text-secondary); transition: var(--transition); }
.tab-btn.active { background: var(--bg-card); color: var(--primary); box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--text-secondary); margin-bottom: 6px; }
.form-group input { width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 14px; font-family: inherit; }
.form-group input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79,70,229,0.1); }
.btn { display: flex; align-items: center; justify-content: center; width: 100%; padding: 11px; border: none; border-radius: var(--radius-sm); font-size: 15px; font-weight: 600; cursor: pointer; transition: var(--transition); }
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: var(--primary-dark); }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
#registerFields { display: none; }
.msg { font-size: 13px; text-align: center; min-height: 20px; margin-top: 12px; }
.msg.error { color: var(--danger); }
.msg.success { color: var(--success); }
#debug { font-size: 11px; color: var(--text-muted); margin-top: 8px; text-align: center; word-break: break-all; }
</style>
</head>
<body>
<div class="login-container">
  <div class="login-header">
    <div class="logo">📋</div>
    <h1>工作面板</h1>
    <p>多设备同步 · 数据私有 · 云端存储</p>
  </div>

  <div class="card">
    <div class="tabs">
      <button class="tab-btn active" id="tabLogin">登 录</button>
      <button class="tab-btn" id="tabRegister">注 册</button>
    </div>

    <form id="authForm">
      <div class="form-group">
        <label>邮箱</label>
        <input type="email" id="email" placeholder="请输入邮箱地址" autocomplete="email" required>
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" id="password" placeholder="请输入密码（至少6位）" minlength="6" maxlength="64" required>
      </div>
      <div id="registerFields">
        <div class="form-group">
          <label>显示名称</label>
          <input type="text" id="displayName" placeholder="如何称呼你？（可选）" maxlength="20">
        </div>
      </div>
      <button type="submit" class="btn btn-primary" id="submitBtn">登 录</button>
      <div class="msg" id="msg"></div>
      <div id="debug"></div>
    </form>
  </div>
</div>

<script src="supabase-config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.110.8/dist/umd/supabase.min.js"></script>
<script>
(function() {
  var msgEl = document.getElementById('msg');
  var btnEl = document.getElementById('submitBtn');
  var dbgEl = document.getElementById('debug');

  function showDebug(txt) { dbgEl.textContent = txt; }

  // Check config loaded
  showDebug('加载配置...');
  if (typeof SUPABASE_URL === 'undefined') {
    msgEl.className = 'msg error';
    msgEl.textContent = 'supabase-config.js 加载失败';
    btnEl.disabled = true;
    return;
  }
  if (SUPABASE_URL.indexOf('YOUR_PROJECT_ID') >= 0) {
    msgEl.className = 'msg error';
    msgEl.textContent = '请先配置 supabase-config.js';
    btnEl.disabled = true;
    return;
  }

  // Init Supabase
  showDebug('初始化 Supabase: ' + SUPABASE_URL);
  var supabase;
  try {
    if (!window.supabase) throw new Error('Supabase SDK 未加载');
    supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    showDebug('Supabase 初始化成功');
  } catch(e) {
    showDebug('初始化错误: ' + e.message);
    msgEl.className = 'msg error';
    msgEl.textContent = '初始化失败: ' + e.message;
    btnEl.disabled = true;
    return;
  }

  // Tab switching
  var mode = 'login';
  document.getElementById('tabLogin').addEventListener('click', function() {
    mode = 'login';
    document.getElementById('tabLogin').classList.add('active');
    document.getElementById('tabRegister').classList.remove('active');
    document.getElementById('registerFields').style.display = 'none';
    btnEl.textContent = '登 录';
    msgEl.textContent = '';
  });
  document.getElementById('tabRegister').addEventListener('click', function() {
    mode = 'register';
    document.getElementById('tabRegister').classList.add('active');
    document.getElementById('tabLogin').classList.remove('active');
    document.getElementById('registerFields').style.display = 'block';
    btnEl.textContent = '注 册';
    msgEl.textContent = '';
  });

  // Submit handler
  document.getElementById('authForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    msgEl.className = 'msg';
    msgEl.textContent = '';

    var email = document.getElementById('email').value.trim();
    var password = document.getElementById('password').value;
    var displayName = document.getElementById('displayName').value.trim();

    if (!email || !password) { msgEl.className = 'msg error'; msgEl.textContent = '请输入邮箱和密码'; return; }
    if (password.length < 6) { msgEl.className = 'msg error'; msgEl.textContent = '密码至少 6 位'; return; }

    btnEl.disabled = true;
    btnEl.textContent = '处理中...';
    showDebug('正在请求...');

    try {
      if (mode === 'login') {
        showDebug('登录: ' + email);
        var result = await supabase.auth.signInWithPassword({ email: email, password: password });
        if (result.error) throw result.error;
        showDebug('登录成功，跳转...');
        window.location.href = 'app.html';
      } else {
        showDebug('注册: ' + email);
        var result = await supabase.auth.signUp({
          email: email,
          password: password,
          options: { data: { display_name: displayName || email.split('@')[0] } }
        });
        if (result.error) throw result.error;
        showDebug('注册返回: session=' + !!result.data.session);

        if (result.data.session) {
          window.location.href = 'app.html';
        } else {
          msgEl.className = 'msg success';
          msgEl.textContent = '注册成功！请查看邮箱确认链接';
          btnEl.disabled = false;
          btnEl.textContent = '注 册';
          showDebug('需要邮箱验证');
        }
      }
    } catch (err) {
      showDebug('错误: ' + (err.message || err));
      msgEl.className = 'msg error';
      msgEl.textContent = err.message || '操作失败';
      btnEl.disabled = false;
      btnEl.textContent = mode === 'login' ? '登 录' : '注 册';
    }
  });
})();
</script>
</body>
</html>
